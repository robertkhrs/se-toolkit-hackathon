services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linguasim
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

  bot:
    build: .
    command: python bot.py
    env_file: .env
    depends_on:
      - api

volumes:
  pgdata: